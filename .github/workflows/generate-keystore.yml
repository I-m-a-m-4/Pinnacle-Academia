name: Generate Keystore
on:
  push:
    paths:
      - 'trigger-keystore'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate Keystore and AssetLinks
        run: |
          # Generate persistent keystore
          keytool -genkey -v -keystore pinnacle-academia.keystore -alias pinnacle -keyalg RSA -keysize 2048 -validity 10000 -storepass pinnaclepass -keypass pinnaclepass -dname "CN=Pinnacle Academia, OU=Mobile, O=Pinnacle Academia, L=Lagos, S=Lagos, C=NG"
          
          # Extract SHA-256
          SHA256=$(keytool -list -v -keystore pinnacle-academia.keystore -alias pinnacle -storepass pinnaclepass | grep SHA256: | awk '{print $2}')
          echo "Discovered SHA256: $SHA256"
          
          # Create well-known directory
          mkdir -p public/.well-known
          
          # Create assetlinks.json
          cat <<EOF > public/.well-known/assetlinks.json
          [{
            "relation": ["delegate_permission/common.handle_all_urls", "delegate_permission/common.get_login_creds"],
            "target": {
              "namespace": "android_app",
              "package_name": "com.pinnacleacademia.app",
              "sha256_cert_fingerprints": ["$SHA256"]
            }
          }]
          EOF
          
          # Commit to repository
          git config --global user.name "Pinnacle Auto-Keystore"
          git config --global user.email "bot@pinnacleacademia.com"
          git add pinnacle-academia.keystore public/.well-known/assetlinks.json
          git commit -m "chore: auto-generated persistent android keystore and assetlinks"
          git push

