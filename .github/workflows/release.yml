name: Release
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  release:
    name: Build & Release (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          # No extra brew deps usually needed for standard Tauri, but can add if necessary

      - name: Build frontend
        env:
          IS_TAURI: true
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_EMAILJS_INVITE_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_INVITE_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_INVITE_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_INVITE_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_INVITE_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_INVITE_PUBLIC_KEY }}
          NEXT_PUBLIC_STORAGE_ENCRYPTION_KEY: ${{ secrets.NEXT_PUBLIC_STORAGE_ENCRYPTION_KEY }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          NEXT_PUBLIC_EMAILJS_RECEIPT_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_RECEIPT_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_RECEIPT_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_RECEIPT_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_RECEIPT_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_RECEIPT_PUBLIC_KEY }}
        run: |
          node scripts/prepare-tauri.mjs
          npm run build

      - name: Build the app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Pinnacle Academia v__VERSION__'
          releaseBody: 'Pinnacle Academia Multi-Platform Release (Windows/macOS). For the best experience, use the auto-updater within the application settings.'
          releaseDraft: false
          prerelease: false

      - name: Verify Artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse

      - name: Verify Artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          ls -R src-tauri/target/release/bundle

      - name: Generate and Upload latest.json (Windows Only)
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-latest-json.mjs

      - name: Upload Built App Artifacts (Windows/macOS)
        uses: actions/upload-artifact@v4
        with:
          name: pinnacle-academia-${{ matrix.platform }}-bundle
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

  release-android:
    name: Build & Release (Android)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Android SDK setup
        id: setup-android
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: |
          # Detect NDK more reliably
          if [ -z "$ANDROID_NDK_HOME" ]; then
            if [ -d "$ANDROID_SDK_ROOT/ndk" ]; then
              NDK_PATH=$ANDROID_SDK_ROOT/ndk/$(ls $ANDROID_SDK_ROOT/ndk | sort -V | tail -1)
            else
              NDK_PATH=$ANDROID_SDK_ROOT/ndk-bundle
            fi
          else
            NDK_PATH=$ANDROID_NDK_HOME
          fi
          
          echo "Pinnacle Academia: Using NDK at $NDK_PATH"
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          
          # Add NDK toolchain to path
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin
          echo "$TOOLCHAIN" >> $GITHUB_PATH
          
          # Set explicit linkers for cargo
          # Note: The version '33' in the binary name might vary, but standard NDKs usually have a generic clang or one with a version.
          # We'll use the generic aarch64-linux-android*-clang wrapper.
          CLANG_PATH=$(find $TOOLCHAIN -name "aarch64-linux-android*-clang" | head -n 1)
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CLANG_PATH" >> $GITHUB_ENV
          echo "CC_aarch64_linux_android=$CLANG_PATH" >> $GITHUB_ENV
          echo "Pinnacle Academia: Linker set to $CLANG_PATH"

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Extract App Version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libssl-dev libayatana-appindicator3-dev
          npm install

      - name: Build frontend
        env:
          IS_TAURI: true
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_EMAILJS_INVITE_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_INVITE_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_INVITE_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_INVITE_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_INVITE_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_INVITE_PUBLIC_KEY }}
          NEXT_PUBLIC_STORAGE_ENCRYPTION_KEY: ${{ secrets.NEXT_PUBLIC_STORAGE_ENCRYPTION_KEY }}
          NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
          NEXT_PUBLIC_EMAILJS_RECEIPT_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_RECEIPT_SERVICE_ID }}
          NEXT_PUBLIC_EMAILJS_RECEIPT_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_RECEIPT_TEMPLATE_ID }}
          NEXT_PUBLIC_EMAILJS_RECEIPT_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_RECEIPT_PUBLIC_KEY }}
        run: |
          node scripts/prepare-tauri.mjs
          npm run build

      - name: Initialize Android (if not exists)
        run: npx tauri android init --ci
        continue-on-error: true

      - name: Patch Android Manifest with Camera Permissions
        run: node scripts/patch-android-manifest.mjs
        continue-on-error: true

      - name: Generate App Icons
        run: npm run tauri icon public/pinlogo_square.png
        continue-on-error: true

      - name: Build Android APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.NDK_HOME }}
        run: |
          npm run tauri android build -- --apk --target aarch64

      - name: Locate, Sign and Prepare APK
        run: |
          echo "Searching for APK files..."
          APK_PATH=$(find . -name "*.apk" | grep release | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find . -name "*.apk" | head -n 1)
          fi
          
          if [ -n "$APK_PATH" ]; then
            echo "Found APK at: $APK_PATH"
            
            # Check if pinnacle-academia.keystore exists, otherwise fallback to temp
            if [ ! -f "pinnacle-academia.keystore" ]; then
                echo "Pinnacle Academia Keystore not found, falling back to temp"
                keytool -genkey -v -keystore pinnacle-academia.keystore -alias pinnacle -keyalg RSA -keysize 2048 -validity 10000 -storepass pinnaclepass -keypass pinnaclepass -dname "CN=Pinnacle Academia, OU=Mobile, O=Pinnacle Academia, L=Lagos, S=Lagos, C=NG"
            fi
            
            # Find apksigner
            APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -V | tail -1)
            echo "Using apksigner at: $APKSIGNER"
            
            # Sign the APK
            $APKSIGNER sign --ks pinnacle-academia.keystore --ks-key-alias pinnacle --ks-pass pass:pinnaclepass --key-pass pass:pinnaclepass --out "./pinnacle-academia-v${{ env.APP_VERSION }}-SIGNED.apk" "$APK_PATH"
            
            echo "SIGNED APK ready at ./pinnacle-academia-v${{ env.APP_VERSION }}-SIGNED.apk"
          else
            echo "CRITICAL: No APK file found!"
            exit 1
          fi

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./pinnacle-academia-v${{ env.APP_VERSION }}-SIGNED.apk
          tag_name: v${{ env.APP_VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pinnacle-academia-android-apk
          path: ./pinnacle-academia-*-SIGNED.apk
          if-no-files-found: warn
